body:
  text: 金石史目錄類二金石之屬提要臣等謹案金石史二卷明郭宗昌撰宗昌字允伯華州人平生喜談金石之文所居沚園在白崖湖上常搆一亭柱礎墄􅀈皆有欵識銘贊手書自刻之凡三十年而迄不成盖迂僻好異之士也與同時盩厔趙崡皆以搜剔古刻為事崡著石墨鐫華宗昌亦著此書而所載止五十種僅及趙書五分之一上卷起周迄隋唐下卷唐碑二十餘而已宋絳州夫子廟記一篇間雜其中殆仿原本集古目錄不序時代之例歟其論石鼓文主董逌廣川書跋之説據左傳定為成王所作已為好異又謂以石為鼓無所取義石又不類鼔形改為岐陽石古文則乖僻更甚矣其論嶧山碑一條引唐封演謂其石為曹操所排倒而云拓跋燾又排倒之何一石而兩遭踣云云考封演聞見記云秦始皇刻石李斯小篆後魏太武帝登山使人排倒之無曹操排倒之語殆宗昌所見之本或偶脱太字因誤讀為魏武帝遂謬云兩次排倒其援引疏舛亦不足據然宗昌與趙崡均以論書為主不甚考究史事無足為怪觀其論衡岳碑比干墓銅盤銘季禮碑天發神䜟碑碧落碑諸條皆灼指其偽頗為近理其論懷仁集聖教序勝於定武蘭亭盖出於鄉曲之私自矜其闗中之所有不為定論故後來孫承澤深不滿之然承澤作庚子銷夏記其論列諸碑實多取此書之語則固不盡廢宗昌説也惟其好為大言冀以駭俗則眀季山人譎誕取名之慣技置之不問可矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序吾華郭𦙍伯先生以間出之才遭不偶之數余方之郭有道欽其道而惜其遇也先生生與予父同齡忘年友余誼最篤把酒論文常繼日夜甲申亂後失家余索居東村而先生在郭南幽篁中同患相恤接見尤密即豺狼冰雪不爲阻是以知先生無過余者先生明以析理精以博物制器天巧書法精善議論淹通著述淵奥談藝之家取爲折衷至於秉禮正俗士大夫多宗之可謂賢矣辛卯仲冬余别入都壬辰初夏聞先生殁痛哭數日夜歸弔於家哭於墓即問遺書其家小阮能藏之惟金石史亡矣益深於慟甲午又入都從民部張爾唯飲言及金石史之亡也而張公曰吾能存之亟觀之乃習見本也嘻是生𦙍伯也且喜且悲八月八日手錄二十八功竟人亡業顯不朽在是讀是書者毋謂是書足以盡𦙍伯即余之序是書亦不能極言𦙍伯而是書亦可以知𦙍伯矣甲午十月十一日劉澤溥序
