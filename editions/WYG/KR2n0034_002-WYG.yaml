body:
  text: 金石史卷二明郭宗昌撰唐大雅集王右軍書吳將軍碑此碑破碎已無碑形余手摹其文止餘一二十字文已不可讀尚存𢎞福寺僧大雅集右軍書為大將軍吳文立又有開元九年字若神鬼呵䕶並姓名年代無一殘闕亦奇矣碑字極類聖教序第大雅懷仁已分人天何能較優劣耶此石萬厯間王文學堯惠遊其西安府隍中見之亟語郡守移置頖宮余聞吾家有道碑遭一儒生布氊其下嘯賞良久一夕失所在跡之無踪今刻惡道匿跡訖無傳之者與城土灰何異堯惠自我得之不私諸己使右軍遺跡亡而復存賢矣哉唐九成宮醴泉銘趙子固謂率更化度醴泉為楷法第一余謂唐楷第一耳顧化度已毁醴泉非舊先正奉八十年前於先外祖確山公請得一本百年前物也公姓東氏閥閱甲關中圖籍之癖即斷墨殘楮珍笥不棄故古碑版最富余志學之年即酷好之萬厯間託趙常吉鑒定􅋔潢差稱善本鋒鎩猶存剥蝕儉瘦於意未盡後過渭南宗伯元象先生出示一本云朱汝脩物也余一見擊節咤異宗伯舉酒謂余朱趙賞鑒收藏聲溢都門每過輒出共賞皆拍案絶叫天下第一本也汝脩物故遺書㪚亡以三十千得之舍人子偶坐客謬指剝蝕宗伯輒以大白浮之余生平所見數十本皆出此本下昔人云記書每似憶良朋余於法書亦云往來胸臆二十年間頗得數本别有識最後得此本僅闕十四字壯偉瓌奇頓還舊觀精韌界縷猶存真北宋物也昔人所稱草裏驚蛇雲間電發森森若武庫矛㦸者釐然可見視宗伯本不啻奕奕過之矣憶昔子函著石墨鑴華見一善本便鼔掌絶叫四座色飛一日語余曽見一善本竟入淛中輒為扼腕垂二十年始獲此本恨不能聚諸公一堂舉酒拍案絶叫也客或嘲余寧渠昭陵蘭亭敬仁像贊篤好乃爾因解曰余不云乎唐楷第一耳又當趣大白浮之客皆大噱又人知信本變晋法不知用筆結體多從古隸中出故小歐陽遂作批法雖今隸之變亦家學有自觀宋搨醴泉銘首行如宮字左㸃作竪筆正鋒一畫而微轉便有韻度是漢分法也今撫搨日久碑字漸減細瘦失真遂成一㸃筆意了不可㝷故古搨足尚也唐道因禪師碑古跡吾不得而見之矣今之摸搨失真又了無足觀惟有古碑版耳率更碑版尚有數種而蘭臺止存一道因法師碑蘭臺父子齊名號大小歐陽率更楷法源出古隸故骨氣洞達結體獨異居唐楷書第一小歐陽早孤購求父書不惜重貲力學不倦能窺源本故輒作批法家學相承非剏造也唐贈太師魯國孔宣公碑此爲唐髙宗封泰山還過曲阜祀孔子贈太師所立碑也敕崔行功撰孫師範書時天下大權胥歸中宮天子拱手中外謂之二聖是非真能尊孔子者行功纂述雖頗博雅詳縟有乖厥體善乎太史公之贊孔子也曰髙山仰止景行行止雖不得至然心切向往之自天子王侯中國言六藝者折衷孔子可謂至聖矣師範隸書瘦硬而方削寡情是魏以後法非漢法也反不如開元後之風流藴藉也唐述聖頌碑在華陰西岳廟一道院余每過輒徘徊其下爲達奚珣撰序呂向撰頌并書是頌其𤣥宗所建華岳碑也今碑已燬尚存塊石巋然如山頌稱其光洞納不可復見至云嶷若斷山真成碑䜟又云羣神離立負其下彷彿猶存尚餘兩字徑數寸甚竒偉飛動恍如龍翔鳳舞昔向曽以美人賦諫幾死張說爲請即拜補闕賜銀章朱紱不可謂不遇也建碑時帝侈心既萌且謂岳神來迎頌不可以諷何也碑字結體類登善聖教骨氣少孫峭爽過之所以不及耳評者謂歐鍾相雜既不類筆端流潤而微傷挑反謂筋骨乾枯又何也唐華岳精享碑此刻之後周碑陰者蘓頲承𤣥宗命禱雨有應而建也主簿咸廙撰御史劉升書何其當開元間隸體絶無豐艷妖冶之習猶存古意耶第得漢支不得體得漢象不得意即起漢人於九原能不鼔掌李休光名額俱粗野可笑唐褚書同州倅㕔聖教序同州禇書聖教序記與慈恩大小畧同而同州饒骨慈恩饒韻如出兩手而同州又有墜石驚電之勢後云龍朔三年癸亥六月二十三日建大唐褚遂良書在同州倅㕔復不稱臣又與慈恩異公永徽元年庚戌出爲同州刺史三年還朝六年貶潭州顯慶二年貶愛州三年戊午卒於貶所至龍朔癸亥卒已六年矣安得復以書事豈二碑皆非手書上石公没同人不勝故鄉之思復摹刻官所實紀所建歲月初不計其存亡其兩地字跡不同者摹手異耳昔人臨蘭亭出歐陽率更故楷法勝出褚河南故行法勝此必習褚者摹慈恩習歐者摹同州故各自具一氣骨風韻也雖愧具眼竊憶張湯窮鼠何渠踰此元美先生於此致疑恨不能起九原而語之唐褚書鴈塔聖教序記禇河南楷書聖教序記關中有二種一在同州倅㕔一在長安慈恩寺在慈恩者序記自爲二碑嵌鴈塔門東西兩旁致令辟甚精余嘗手摹其文筆法如輕雲纎阿若無若有所謂瑤臺青瑣窗暎春林嬋姢美女不勝羅綺信然序後云永徽四年癸丑十二月十日建尚書右僕射上柱國河南郡開國公臣褚遂良書此自同州召還後筆稱臣者以御製文非奉敕書也唐王淸源忠嗣碑清源碑元載撰王縉書清源不獨忠勇敢戰其策石堡料祿山皆深謀早見非一將之識也獨爲林甫所惡陰使誣告明皇不察論死非哥舒翰以官爵贖罪幾至不免然猶貶死史稱工於謀國拙於身圖其然哉元載淸源女夫也其筆力庸冗固爾不言林甫排陷何也縉書法蒼老雖藏鋒斂態而復開宋人率直門戸史稱忠嗣華州鄭人碑稱華隂人碑竪州城西三十里赤水道南又南高原即其塜也余猶及布毡其下頗極穹窿追琢之妙非今人可及側刻水獸尤竒異怪偉益令人逺想唐人畫跡不覺色飛萬厯間渭南崔令君邦亮忽移置城縣之西道北不知何故唐少林寺碑此碑上方刻太宗爲秦王時征王世充移寺主及軍民檄也首𤣥宗八分書七大字謂太宗文皇帝御書以文皇天授即無論羽書交馳無暇手楷今觀其用筆懁佻凡近既不類文皇筆且世民二字獨大而又行草一見便奇偉不羣真如李密見秦王時狀始知檄必出記室而秦王自書名耳不然何獨别作行草與檄字不類耶豈𤣥宗欲昭先跡偶誤羣臣墨墨訖無正之乎檄文下方即少林寺碑崔㴶撰並書王元美謂懿公少負文筆號霹靂手此㴶父琰之事琰之爲同州司戸參軍甚少不主曹務刺史李崇義内輕之積案數百讓使趣斷琰之命吏連紙進筆爲省决一日都盡與奪當理詞筆勁妙崇義驚曰子何自晦成我過耶由是名動一州號霹靂手子㴶仕至吏部尚書曽諫止造玉真金仙觀當時稱長於敷陳碑復繁蕪書頗得褚河南之勁俊而無窅暎春林之致唐嵩陽觀碑嵩陽觀碑是徐浩分書李林甫述其道士孫太冲爲明皇煉丹至九轉而作頌者也在昔如秦皇漢武皆希心仙術然徐市三千畏誅不歸文成五利終至大戮而明皇尚爲太冲起觀立碑終始不悟當由林甫奸佞蠱之耳林甫不足言侍中分法簡穆不墮明皇豐艷之習是當以筆諫而復爲書碑亦遇之不幸也評者謂子敬元常異代同友孔氏升堂得門窺牖過矣唐段行琛碑唐段行琛字行琛忠烈秀實父也行琛卒於天寳九載碑建於大厯十四年已越三十年矣時忠烈四鎭北庭涇原鄭潁諸州節度使開府儀同三司御史大夫張掖郡王故始立石光昭其考張増書碑李同系篆額不著撰文姓名似亦太草草矣碑在汧陽忠烈故里尚完好可讀碑稱夫人樂平狄氏下夀初登先時永逝門子祥頴仲子秀成季子同頴則忠烈同母兄弟四人可補史傳之闕増書疎縱不入格歐虞風軌掃地矣唐書行楷八分皆遠超六代惟此碑隤然自放則近啟宋元矣唐周公祠靈泉碑鳳翔府岐山縣鳳棲鄉周公祠舊有泉水久竭大中間泉忽躍出崔觀察珙奏狀亦水旱恒事耳宣宗手詔褒嘉猶見下霽而史尚以無復仁恩察察爲明短之今世何可得也碑勒奏及手詔謝表筆氣蕭散有褚河南意後書年月及銜復似栁如出兩手唐景龍觀鐘銘景龍觀唐中宗所起睿宗復爲煉銅鑄鐘而銘之中宗是醒寐不知昏曉者睿以臨淄幸登天位當清濁二儀再世牝晨淫薉天地不思反政而復察東宮幾成太平之亂亦是側耳不聞雷霆者何事鐘耶今在西安鐘樓余曽手摹其文睿宗御製銘書復古雅拙樸在唐以上是楷法兼篆分者惜姓名未著其源出自興和年李仲璇修孔子廟碑劑之以雅故勝余收金石文數百種除彝器欵識惟此爲金耳唐柳尚書公綽武侯祠碑諸葛武侯祠記裴晋公度柳尚書公綽在武相元衡幕中時撰書公綽於公權兄也米元章評其勝弟然無復蘊藉風流雖極揮洒視誠懸擫宻雅致不及與老顚糾糾雄傑格力知有合也然柳正米偏又唐宋之别也碑尚完好如新豈忠武之靈鬼神呵䕶耶惜碑不能寫其遊龍神變莫測之妙而卒復歸之正昔人謂忠武如龍無可比擬余謂惟太史公文右軍書似之恨不得爲之碑寫其神變令觀者稱快也唐碧落碑絳州碧落碑尚書故實謂陳惟玉書髙祖子韓王元嘉四男爲先妃所製洛中紀異錄謂李諶爲母房太妃追薦像成忽二道士來自謂天下能篆撰者李聽所爲則扄戸三日乃開化二白鴿飛去篆文宛然像背矣王元美謂此雖誕妄然李陽冰覽之七日而不忍去習之十二年不成其妙如此豈惟玉輩小子所辯乎識之以俟知者余謂篆書三代尚矣下訖秦絶矣世傳三代遺跡皆屬贗作獨岐陽石古文彞器欵識爲真卽字畫不必盡識而古雅無前望而可辯此碑獨以怪異奥人以不可解所以有扄戸化鴿之說而㸃畫形像結體命意雜亂不理其髙處不能遠追上古下者已墮近代惡趣如村學究教小兒角險凡俗可厭定爲惟玉輩書無疑唐人於八分尚不能造極况古篆乎後人懾於傳聞之異眩然莫辨遂不敢輕加評駁不知李陽冰之慕習非爲盲瞽定屬謬傳曷足據爲斷案耶釋文雖非至者反不失唐人氣格但作字潦倒未稱此石無足深論獨恨不能起元美於九原而與之上下其議爲之惘惘今天尊像字不存乃是别刻之石以應搨者元美本正是别刻碑名碧落李肇謂碧落觀也李漢謂終於碧落字今其文完善可讀非終於碧落而開元間始改名龍興寺初實名碧落觀也則肇説有據唐代國公主碑代國長公主睿宗第四女也名華字花婉以開元二十二年六月二十九日薨下嫁鄭萬鈞碑稱摴蒲奕碁盡得微妙箜篌阮咸隔簾隨手有若天授雖述其心靈聰敏實乖詩人無非之儀唐主多驕恣罔終良有以也碑字極得褚河南楷法因見唐代宏文之治源本流發非如今世杜撰可笑也唐涼國公主碑涼國碑爲𤣥宗分書蘓頲撰書法遒逸匀適少遜孝經縂脫盡六朝之習者公主睿宗第六女名㝹字華莊元美謂碑爲華莊史作花莊而不言名子函石墨鐫華直以字爲名二公似俱未見其碑也余當從叔兄至奉先遊唐諸陵犯暑造極羣山北峙萬峯連亘一目無際竟不辯何者爲陵也歸而得數碑此石卧草間字跡完好如新於時恨楮墨不具後遣工搨得已爲土人擊仆損半恐一經採訪官使或搨不勝誅求故也公主初封仙源嫁薛稷子伯陽坐父稷流嶺表自稷復改今封復嫁溫彥博曽孫㬢碑自不得不諱伯陽而史不當逸㬢也唐實際寺隆闡禪師懷惲碑懷惲南陽人姓張氏唐髙宗見夢辟至親授朱紱不受敕祝髪西明寺永昌元年敕徵主實際寺今碑置西安府學都𤣥敬謂碑無書撰人姓名王元美謂僧懷惲撰書今碑云弟子思莊敬想淸徽勒兹𤣥琰大足元年十月二十二日神遷春秋六十有二神龍元年敕贈隆闡大法師天寳二年癸未建碑則二公俱似未竟讀其碑也蓋緣碑首有懷惲及書四字元美遂誤耳余攷京兆府章敬寺又有懷惲者諡大覺禪師泉州同安人謝姓元和初憲宗召居上寺元和十二年十二月二十二日示滅建塔灞水曰大寳相塔碑所謂懷惲書者豈卽大覺耶何以又稱及書耶按天寳癸未至元和十二年丁酉已七十五年卽大覺滿百歲計至天寳建碑之年纔二十五歲豈自以生晚故云及書幾幸及之耶書復老健不類少年且大覺以宗㫖著而不以書名有謂惲名後人増刻者余手摹其文絶無痕迹可辯不知何也書復勁駿倣聖教無一筆不似而評者又謂婉媚纒繞無晋人之致皆所未解唐圭峰禪師碑圭峯禪師碑裴公美休撰并書柳誠懸篆柳書名噪一時視公美固在鴈行裴博綜教相通徹祖心手書藏經五百函序諸疏論固是宰官禪那其父中明肅越州觀察使又建龍興大佛殿先是越州沙門曇彥同許詢造塔未就詢亡彥師可一百二十歲猶存岳陽王將撫越彥曰元度來也時詢亡已三十餘年弟子疑其耄忽岳陽果至以誌公密示先造彥彥遥召曰許元度來何暮昔日浮圖今如故岳陽曰弟子蕭詧何呼許元度彥曰未達宿命拉入室席地以三昧力加被岳陽忽悟前身造塔事宛若目前因重新二塔衆以殿事請彥曰吾緣力未至二百年後以待非衣刻石記之及裴至期應不爽遂爲建塔觀此則裴公再世皈依宿因故碑能爲其家言復無精詣何也唐不空禪師碑不空梵名阿目佉䟦折羅華言不空金剛止行二名略也碑爲嚴郢撰徐浩楷書浩字季海越州人肅宗召授中書舍人官至太子少師帝喜其書法寵絶一時其父嶠之善書以法授浩論者謂如怒猊抉石渴驥奔泉袁昻又謂如南岡士大夫徒尚風範不免寒乞今觀碑字饒骨力而乏規度不堪與王謝門中子弟周旋謂近大令結體甚莊重而復謂寒乞何也不空得縂持門靈異甚多故不獨伏泉澄海數事如値大旱京兆尹蕭昕請致雨空呪畵龍投曲江白龍尺許振鱗出水亘天昕鞭馬疾驅奔及十歩暴雨驟至比至永崇里已决渠矣𤣥宗嘗召述士羅公遠同至便殿校功力殿石瑩滑師借逺如意遽激􅌥羅再三取之不得上起不空曰三郎勿取此影耳因舉手示羅如意又西蕃宼西涼詔不空入誦仁王密語神兵見於殿庭西涼果奏東北雲霧中見神兵鼔噪蕃部有金色鼠皆咋絶弓弦城幻幻光明王怒睨蕃師大奔帝敕諸道城樓置天王像此其始也又邙山有虵頭若丘陵見不空乞度遂欲陷河雒快所居不空授戒說法且曰昔以瞋深受此苦報今復忿恨吾力何及當思吾言此身自捨旬月遂死澗中不空多秘密法當時甚著碑荒落不稱余所見尚多遺忘故少爲筆削附載於此唐𤣥秘塔碑𤣥秘塔爲大達法師建在長樂南原今移西安府學裴休撰柳公權書公美固是宰官禪那文於禪理無能闡發獨述其寵遇人主傾動貴衆何也誠懸書雖與歐虞禇顏并稱猶在鴈行而米元章評書自負具眼紕漏顚倒一似無目者其云歐如新瘥病人顏色憔悴舉動辛苦虞如學術休糧道士神淸體疲禇如熟戰御馬舉動隨意别有驕色顏如項羽按劍樊噲排突硬弩欲張鐵柱特立昻然有不可犯之色柳如深山得道士修養已成神氣清健無一塵俗嗚呼此何異囈語耶余謂柳如趙王敦劍垂冠曼胡之纓短後之衣瞋目而語難顏如龍泉太阿登髙臨深巍巍翼翼褚如公孫盛年舞劍器波瀾蔚跂玉貌錦衣歐虞法圎法方則固是諸侯之劍也若夫見影不見光其在晋法乎唐大智禪師碑史惟則書雖濃郁而縝密暢適筋骨不乏所以肉不病肥書述稱古今折衷大小應變甚合律以漢法又當别論槩以此棄之則所謂思如泉而吐鳳筆似海以吞鯨者又何處生活嚴挺之文亦序述有體唐楚金禪師碑余嘗與人論詩有右髙華左沉實者余曰否否何渠以天漢廢洪河第所辨者格耳一不入格即墮惡趣此論可通於書吳通微楚金禪師碑輕圓婉暢有類髙華試以平原倔强較之當復取此又所不解豈快士偶快快筆耶藏真律公帖素師藏真律公三帖是宋游師雄刻之關中者故極工無復遺恨其書飛動遒逸天真爛然比之聖母多筋少肉故勝孫䖍禮云偶然欲書一合也此豈亦偶然落筆者耶或謂遊絲連綿筆非也所謂遊絲筆者都無輕重斷續離合折旋之妙若意斷而筆連雖右軍絕少大令往往不乏安得概以遊絲病之似非宋綘州夫子廟碑綘州夫子廟記集王逸少書搨刻手俱精雅視懷仁集聖教序雖相絕千里然猶不失邯鄲之步第中忽雜以一二草書杜撰不入格宋人傖父之態居然畢露矣豈其欲踞右軍上耶宋人多不自量往往乃爾唐李元諒懋功昭德碑李元諒本安息安氏少養宦官駱奉先冒姓駱名元光鷙敢有謀㑹朱泚之亂能鎭定華州華人感之於其將移鎭隴右行軍司馬董叔經請之天子立碑而張濛撰述作頌所謂昭德懋功皆實錄也韓秀弼分書勁駿瘦雅不减擇木當兵戈雲擾碑復琢磨精工窿然巋然不爲苟就亦足占中興之兆元光以功封武康郡王諡莊威李元諒賜姓名也萬厯初碑卧廢署草間人多薉其上永昌石公元麟來守華州移置郡衙金石史卷二
