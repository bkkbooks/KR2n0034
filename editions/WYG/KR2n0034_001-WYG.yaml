body:
  text: 金石史卷一明郭宗昌撰周岐陽石古文岐陽石古文有謂爲周宣王獵碣者惟董程二氏以左傳成有岐陽之蒐證之皆鑿鑿有據其畧云考之書天子大蒐㑹諸侯施命令非嘗事也史不得無書若宣王蒐岐即周史失之列國不得並逸胡後世無聞焉則爲成王信矣其言真如岳峙不可復撼第廣川有其學有其識有其辯而無其筆故不勝葛藤糾纒確論反晦耳鄭樵謂爲秦惠文後及歐陽三疑皆瞽說迷謬不足與辯韋應物謂爲文王之鼔宣王刻詩真如少君古強之徒曽目覩其事也何物又有馬子卿者以爲宇文周時作一似無目者益大可笑如此樵又爲石鼔者立碑之漸千載名言至謂以石爲鼔繇其土地之所出則非也古人制作尚象不爲虛器豈止以地之所出苟且不法耶觀九州貢物攷工制器無一不窮極奥渺以石爲鼔何所取則乎今石在太學聖廟㦸門左右寳䕶無人冬輒篝火撫搨燬剝日甚余曽手摩其文與鼔形了不似其堅類玉故能久存就石形之自然少加琱琢旋轉刻文行字或七或六少華山前石之堅潤者與此無異想當時因有佳石即刻置蒐所而已第文無不典字無不雅民休王遊自相寳愛此三代有道之長也非如後世竭力徵石造天無極刻龍繡螭築藩置守妄意垂逺然不一轉盼旋離野火能得鬼神呵䕶至今哉悲夫余旣􅋔潢成而題曰周岐陽石古文斷以成王時物而不以鼓名足刋古今之謬夏衡岳贗碑相傳禹衡岳字七十七在密雲峯楊用修得之張僉憲云宋嘉定中何致子一遊南岳脫其文刻於岳麓用修又刻于滇楊時喬又刻於棲霞用修又謂韓愈劉禹錫朱熹張栻諸人求之不得已得之爲奇幸仰止諸賢冀是恐非紛紜聚訟獵以爲奇余於是喟然歎曰嗚呼是何異逺隔絶域而泣其先也善乎王元美之言也曰銘詞未諧聖經類周冢穆天子傳語㫖哉㫖哉又禹碑余不能隨人悲笑已辯其附㑹因又攷其文與唐小説無異因並載於後禹碑文曰承帝曰咨翼輔佐卿洲渚與登鳥獸之門參身洪流而明發爾興久旅忘家宿嶽麓庭智營形折心罔弗辰往求平定華岳泰衡宗䟽事裒勞餘伸禋鬱塞昏徙南瀆衍亨衣制食􅊀萬國其寧竄舞永奔凡七十七字此豈虞唐語耶唐大厯中有人獨至鳳凰臺見一男子獨與一婦相和而歌聲徹雲際歌罷其人廹視乃二獸一類豬而體特髙蔚有文彩一類龍而小徧體純黃色其人驚走遇行者語其故共往寂無所見惟竹書一束在地取視竹策幾毁文不可辯惟首隸書地出梓桐僞失厥衆邪去立言灌平獲誦於古有文乍得斯人慈心勿用筆冠日輪三十二字其視禹碑何異觀此則益知其贗周武王贗銅盤銘銅盤銘曰左林右泉後岡前道萬世之寧茲焉是寳似非三代語第銘字頗類漢淮南王故宫所出古戈銘而輒謂武王封比干墓抑何據耶余故集金石古文彜器外斷自岐陽石始而不以鼔名他如衡岳壇山比干季札墓題諸書皆妄自附㑹區區不能隨人悲笑而廣川書家張杜復謂陽冰初學嶧山碑後見季札墓字便變化開合如龍如虎勁利豪爽風行雨集陽冰遂從此得篆法抑又何也豈陽冰所見别爲真書非今附㑹可笑者耶今觀陽冰遺跡亦竟不能超唐人而上之烏在其法所從得也秦嶧山銘余藏嶧山銘二種一爲宋淳化中鄭文寳刻之長安者一爲元人摹宋張仲文本刻之鄒縣者元刻不足言文寳刻者猶少存玉箸遺意斯篆不絶如綫此尚可意㑹知非李陽冰輩所能髣髴也唐封演謂其石曹操排倒嗟乎秦雖暴銘詞尚樸古近情真實無飾有合聖人之意非如賊瞞荼戮忠良為鬼為蜮受禪勸進矯詐罔誣弋取漢鼎嘔穢千古而又何以踣其碑也又北魏拓跋燾登嶧山見其石亦使排倒何其一石而兩遭其踣豈踣後復豎之而又遇燾耶抑别爲一石耶始皇以力經營天下思欲威加萬世乃不一轉盼而爲人揶揄如此亦可鑒矣又此元人又摹宋張仲文本重刻之嶧縣者不知張本何如元摹定非其舊元劉之美一記益潦倒極可笑銘後方爲二世詔槩謂頌始皇功德誤矣杜少陵云嶧山之碑野火焚棗木傳刻肥失真又云書貴瘦硬方通神此刻轉瘦於闗中鄭刻而失真益甚則書一瘦硬何渠便通神耶工部時已傳刻失真况宋元乎可爲慨歎漢韓明府叔節修孔廟禮器碑漢韓明府修孔子廟器碑才剝蝕十一字存者猶有鋒鎩文殊髙古尚可讀豈神物固有鬼神呵䕶耶其字畫之妙非筆非手古雅無前若得之神功弗由人造所謂星流電轉纎踰植髪尚未足形容也漢諸碑結體命意皆可髣髴獨此碑如河漢可望不可即也韓明府名勑字叔節歐陽永叔謂書傳無以勑命名者秦制天子之命稱勑漢用秦法當時臣下豈敢以勑自名者是以勑爲敕也詳廣川書䟦第意有未明余更著之韓明府自名勑從力來聲音賚勞也亦作徠徠來答勤曰勞撫至曰勑示有節也故字叔節以勑爲敕僞也敕從攴束聲誡也攴小擊也又有束縛之義故爲敕命之敕又攴傍加束音策馬箠也束若讀刺又敕從攴束聲音其木别生也支持也與攴異四字易淆故詳著之然永叔謂人無名敕者亦屬臆說因記得一事余方謂石千年猶存當爲鬼神呵䕶有一憲使宦魯者余以此碑爲記憲使檄曲阜令致得數搨以印鈐手板報云曲阜諸生大閧石已薤粉矣取家藏者應命耳余深痛神蹟永絶後死者不得與於斯文每一展玩撫几興歎後復有至自闕里者謂石巋然無恙因出所搨視余嗚呼天下萬事無憑如此然亦足喜也漢魯相史伯時供祀孔子廟碑觀此碑與置卒史碑略同知漢制郡國守相奏章雖不得徑達天子猶得上書尚書府今益一切格忌不得行志所以古今不相及也魯相史晨當漢末季猶能上書享祀孔子至空府竭寺咸來觀禮合九百七十人亦盛矣哉今時何可得也分法復爾雅超逸可爲百代模楷亦非後世可及漢魯相史伯時供祀孔子廟後碑漢史伯時祀孔子有二碑前碑載晨姓氏爵里於建寧元年四月十一日戊子到官乃以令日拜孔子即修禋祀罷歛民錢後碑晨自出奉錢家穀以供禋祀於建寧二年三月癸卯朔七日上尚書時副言太傅太尉司徒司空大司農葢古有大造司徒司空通而論之晨不以案食小節自忽必上之尚書請之天子亦賢矣漢魯相乙瑛置孔子廟卒史碑此漢相乙瑛上書司徒吳雄司空趙戒府請置孔廟百石卒史一人掌主禮器廟祀元嘉三年三月二十七日壬寅雄戒奏可雒陽宫如瑛言又詔選能奉𢎞先聖之禮爲宗所歸者當桓帝時雄戒諸人猶知崇聖如此初戒博學明經劾奏貪殘不避貴戚後與子堅定䇿不能終執本議卒致傾覆是非真能崇聖者按史元嘉止二年碑稱三年三月者蓋是年五月始改元永興耳章懷謂戒字志伯碑作意伯趙明誠疑避桓諱似矣碑即今公移復爾雅簡質可讀書益髙古超逸魏才代漢便不能無小變六朝極矣極之而復故唐爲近古評者槩多别論是非深於分法者漢華山碑新豐郭香察書西岳華山廟碑其結體運意乃是漢隸之壯偉者割篆未㑹時或肉勝一古一今遂爲隋唐作俑如山子諸字是也余家華下近百年前有客訪其石已毁此搨獨巋然如魯靈光並嶽色同來暎發几席殘闕僅百二十餘字存者鋒芒銛利如新拱璧駟馬云何可尚碑建於延熹而謂以莽制東京無二名察書者監書也夫莽漢賊也當莽世已欲啖其肉瀦其宫不顧安有世祖正位二百年尚尊莽制不衰耶按莽孫宗坐罪死莽曰宗本名㑹宗以制作去二名今復名㑹宗是當莽世亦自有二名也况即往牒一按二名不可勝紀則瞽說無據可笑也集古錄謂集靈宫不見他書惟載此碑董逌黄伯思廣引諸書駁之加詳夫以永叔葢代之學缺漏如此誠爲可議然何關名義也則余於此烏容以無辯此搨舊藏墨莊樓雲駒舉以歸余雲駒博雅能詩善漢分法於余獨有臭味之雅余之寳此又不獨以物也漢景君銘漢故益州太守北海相景君銘隸書似聊以勒石非當時名手第小具一種拙樸之意且有八分遺則自是時代使然亦不爲佳也今人不習古反謂一出古人色色皆佳了無軒輊不知三代彝器古雅奇絶千載無匹而野鑄鼎彜非不古色蒼然而花文欵識粗鹵不足觀者多矣矧漢代乎余藏漢碑數種後之所收不可知據吾目覩當以韓勑修禮器碑爲第一嘗評其用筆結體元妙入微當得之神功弗由人造或爲此銘時代前於禮器碑古質似勝按此石建於漢順帝漢安二年青龍在敦牂禮器碑建於桓帝二年涒灘雖經三帝僅十五年耳何時代之足云王元美賞鑑前無古人亦云隸法古雅然當其時正以未雅耳孔廟碑結體古逸兼有分法反謂非其至者皆所未解至謂益州部當言刺史不當言太守額曰銘辭曰誄亦屬未妥東京作者往往如是自是名言因附著之額字小篆去秦幾日更相絶千里余得漢朔方守右第三銅虎符銀錯小篆又絶類秦碑字何也想書碑既非名手額篆亦爾耶漢司隸校尉魯忠惠峻碑魯忠惠名峻字仲嚴山陽昌邑人治魯詩嚴氏春秋舉孝廉除郎中謁者河内太守丞辟司徒司空府舉髙第御史東郡頓丘令九江太守拜議郎太尉長史御史中丞司隸校尉遭母憂自乞拜議郎服竟還拜屯騎校尉以病遜位熹平元年卒門生於商等二百三十人諡曰忠惠公碑已剝蝕不可讀見集古錄書分法峭峻古雅第小開魏人堂室然自是漢格鄭樵氏謂出蔡中郎何據明誠疑之固是余意私諡起於春秋漢末尚節義故尚不廢苻秦既已非古猶諡及隱逸唐朝臣尚加山林之號激貪厲競豈曰罔俾令典三品京朝摸牀結舌循叙考終皆得美諡外吏即品亞六卿德牟夷惠非際時㑹竟以格置夫錄勞則外瘁於内崇體則抔土長掩防大則没無虞悼此義人勞卿所以扼腕太息也乃知私諡所當復古嗚呼今安得此門生故吏乎漢曹景完碑此碑曹景完前爲郃陽令門下掾王敞諸人於中平二年刋石紀功立也據史建寧元年疏勒王於獵中爲其季父和德所殺自立爲王三年涼州刺史孟陀遣從事任涉將燉煌兵與戊巳司馬曹寛西域長史張晏將焉耆龜兹車師前后部合三萬餘人討疏勒攻楨中四十日不下引去碑稱疏勒國王弑父簒位又稱全以西域戊部司馬討疏勒攻城野戰謀若涌泉威牟諸賁和德面縳歸死皆與史異然和德既弑父簒位碑不當稱王史謂曹寛當以碑爲正史止光和六年碑稱七年三月者葢其年十一月始改元中平紀元以年紀事以月無足異者碑萬厯間始出於郃陽此方出最初搨也止一因字半闕其餘鋒鋩銛利不損絲髪因見漢人不獨攻玉之妙渾然天成琢字亦毫無刀痕以余生平所見漢隸當以孔廟禮器碑爲第一神竒渾璞譬之詩則西京此則豐贍髙華建安諸子比之書禮器則季直表此則蘭亭叙自髭聖一評謂鍾古而不今長而踰制心慕手追惟逸少一人王遂踞鍾上余目不識書自謂頗窺漢人三昧弇州識洞千古以方整瘦勁寡情爲漢法是柳誠懸輩可盡晉法也碑隂自伯祺正孝才五十二人外五人名字不􅊀當是書石時闕畧非剝蝕也書法簡質草草不經意又别爲一體益知漢人結體命意錯綜變化不衫不履非後人可及漢太山都尉孔宙碑漢太山都尉孔宙融父也史作伷趙明誠歐陽永叔王元美皆謂卒以延熹四年元美又謂四年都尉廢三年長子褒坐融匿張儉抵罪時融年十六宙卒時僅九歲按建寧二年張儉舉奏侯覧誣儉鈎黨刋章討捕時融年十七非十六也又按碑宙以延熹六年正月乙未卒甚明三公皆史家張杜謂四年何也又案融建安十三年卒年五十六則是永興元年癸巳生至延熹六年癸卯融正十一歲非九歲也夫以文舉望繫漢鼎横遭賊瞞毒荼海内痛盡其卒年史不應浪書至云融年十三喪父史亦矛楯當以卒年及碑爲正其書尚存分法且結體古逸殊不易造元美少之是胸中爲曹氏諸碑所據漢魏咫尺便墮千里文亦典則獨怪文舉十歲謁元禮令問蔚起而碑詞不載古人真樸乃爾在後世不知何如譽借也因記得一事有父以子訟忿恚致殁哭死之文尚欲譽生何耶嗚呼異哉漢孔季將碑隂孔宙碑隂載門生故吏等名楊用修金石古文謂四十二人而余收自張雲至王政反六十二人何也洪丞相适隸釋謂親受業曰弟子傳授曰門生未冠曰門童掾屬曰故吏占籍曰故民似鑿鑿可據漢碑隂字多潦倒此獨超逸古雅非魏人可及金石錄謂捕巡可補姓苑不載弇州謂今皆失之當由偶未收得碑陰實未嘗失也余收有古人名印其姓氏奇異者甚夥皆可補姓苑之遺固不獨一捕巡也吳天發碑吳天發碑人皆懾於怪誕始不能無疑久則信不揣源本寸木岑樓蹄涔滄溟矣余直以爲牛腹書耳彼秦漢之跡所不論上之岐陽石三代彝器其文非不奇古皆爾雅典則何曽爲牛鬼蛇神耶所謂彝器者如彝常之必不可紊作如是器必作如是􅅃絲髪罔踰此古昔足尚也吳不前於漢秦三代也古疏昭然可鏡何遽迷源忘本爲怪誕所懾黄長睿書家張湯是窮穴得鼠者亦稱之何也趙明誠以爲妖其知言哉古篆定當以岐陽石爲第一其岣嶁壇山比干季札諸題皆轉相附㑹斷不可信洞然心目亦無足致疑也司馬氏以魏爲正統已􅆾春秋之義紫陽氏正之庶人心死而復生第有未盡漢獻帝三十年是爲己亥明年改元延康是爲庚子是年十月曹丕簒漢紫陽當於黃初書僭不當削去延康年號獻帝於庚子改元南面而臨天下者一載即曹氏父子梟謀發號施令無不挾之以出北面臣事之者亦一載稱號顧可除之耶義不可除則是三十一年矣始庚午終庚子明年辛丑正昭烈章武接統之年安得謂魏晉授受相接耶若論紀載以延康正月至十月將紀之漢乎紀之魏乎黷亂不經名不正言不順正非所以爲紀載也吳壬寅僭號雖後魏三年庚子爲晉所滅與魏相終始尚後亡僭國非統又不當論僭號之先後也余故列吳碑於前魏勸進碑勸進表或謂是鍾繇書又謂梁鵠書皆未有據視封孔羡碑雖無其矯飾屈强亦無漢人雍雍超逸古雅之致阿瞞才弋漢鼎書法頓分時代人概以漢隸目之謬矣當時華歆與管幼安齊名表首列歆則其寵冠羣奸一時得意千載薉唾視遼海滄涼何如九京有知寧無汗顏魏受禪碑昔人稱受禪碑王朗文梁鵠書鍾繇刻石爲三絶碑顏魯公又謂繇書皆不知何據豈亦張稚圭夢語耶書法同勸進雖小逺漢人雍雍雅度衫履自飾亦復矯矯昔莽簒漢匈奴猶感漢恩不拜新室印至操碑稱南單于諸國皆服或出矯詐若果爾則操奸更出莽上魏封孔羡祀孔子碑昔人以莽操懿德並論而阿瞞神謀鬼筭弋取漢鼎假義立名毒炎燔天不啻過之子丕濟惡父子兄弟間至不忍言矧他人哉讀白馬王詩益慘痛千古此春秋必誅尚欲矯祀孔子耶書法方削寡情矯强未適視漢隸雍穆之度不啻千里書之所自可以知風謂書一藝云乎哉余嘗編詩謂曹氏父子間遽分漢魏操應殿漢不當冠魏又不當䝉帝號也今於書亦然後魏魯郡太守張君頌張猛龍碑是龍爲魯郡太守郡人頌其功德者也其文無足言者其書律以晉法雖少蘊藉而結體錯綜之妙使以劑唐足脫一代方整之累歐陽諸公便可入山陰之室矣然此碑却落嶮峻又未證晉果何也當曰筆與歐顏異也至若蘓黄少變又入别趣書道之難如此然知者鮮矣猛龍字神􅂒按􅂒呼骨切日出氣也其名字險怪不雅馴六朝濫觴於詩亦爾殆不特書也後魏兖州刺史李仲璇修孔子廟碑李仲璇東魏世家當中原雲擾知尊孔子能修繕廟庭先是宫牛阻嶮又能以威惠歸伏史稱所歴並著清勤是且具有文武焉碑不著書者姓名猶存古意雖筆力勁駿如偏面驕嘶又如殊俗揖讓江式書表云皇魏承百王之季世易風移文字改變篆形錯謬隸體失眞俗學鄙習復加虛造以意爲疑炫惑於時不獨正其偏傍正爲此等書發耳唐景龍觀鐘銘源出於此少劑以馴雅便勝後周華嶽碑余嘗過金天祠輒縱觀前代碑版漢碑無一存者獨後周華嶽碑如魯靈光巋然古栢下余手摩其文制作精雅洞達若鍳爲万紐于瑾文趙文淵隸書于瑾嘗著碑頌數十萬言此文殊無可觀文淵爲周書學博士書跡雅爲當時所重宇文泰時命刋定六體至江陵書景福寺碑梁主稱之又以題榜功増封邑除郡守不可謂不遇也而碑字盡偭古法淺陋鄙野一見欲嘔而名動一時何耶竇臮述書賦云文深孝逸獨慕前蹤至師子敬如欲登龍有宋齊之面貌無孔簿之心胸臮避唐諱故文淵作文深當時謂文深師右軍孝逸師大令平梁後王褒入國舉朝貴胄皆師褒獨兩人負二王法二王不作古隸文淵豈獨工行草楷則固不閑於分法耶江式論書法云皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯隸體失真俗學鄙習復加虚造以意爲疑炫惑於時此論其形象㑹意耳况結體乎乃知唐隸雖涉豐艷結體猶爲復古然文淵隸體險俗不入格豈所謂俗學鄙習炫惑於時者耶嗚呼作者不賞賞者不作殊爲恨恨余故表而出之示耳食者隋智永千字文永禪師真草千字文趙宋時刻於關中頗極精工無復遺恨楷則已登山陰正覺如入定僧貌類死人自爾神遊變化草如苦行頭陀行動坐卧不失戒律而時出一字忽復入俗何也斯陀含名往來而實無往來乃知聲聞初果尚不易證也宋楊大年云敕員外散騎侍郎周興嗣次韻敕本梁字傳寫謬爾當時帝王命令尚未稱敕至唐顯慶中始云不經鳳閣鸞臺不得稱敕敕名始此不知此特髙宗故實楊何以遂概往代耶如梁蕭子雲啟云臣子雲奉敕使臣寫千字文此何以稱焉且自漢而下稱敕不暇臚舉止如唐太宗九成宮醴泉銘稱奉敕撰奉敕書不一而足皆在髙宗前而楊瞽說固不足瓣第以董逌亦宗楊說謂爲謬字何也况敕梁二字絶不類安得誤書宋人解經不得輒妄加改竄肆爲曲說此特其小小者耳唐孔子廟堂碑唐書法以歐虞並稱然張懷瓘謂歐若狂將深入時或不利虞若行人妙選罕有失詞又虞剛柔内含歐筋骨外露君子藏器以虞爲優固當至謂秀嶺危峯處處間起則非也歐虞固可並稱今只存一廟堂碑已經五代翻刻丰神尚爾暎發初刻更不知何如耶貞觀四年碑成進御賜以右將軍㑹稽内史印逸少所佩當時已爲文皇所重如此况今日乎唐懷仁集王逸少書聖教序書苑云唐文皇製聖教序時都城諸釋諉𢎞福寺懷仁集右軍書勒石累年方就逸少劇跡咸萃其中按貞觀二十二年髙宗在春宮述聖記至髙宗咸亨三年始建碑已二十八年矣則碑非文皇刻也豈懷仁集書乎貞觀間至咸亨始勒石耶黄長睿謂所見右軍遺帖與碑字纎微克肖今右軍遺跡日亡眼中更無此覩所存止有此石又復就淪慨念神踪可勝逺想長睿又謂於時翰林侍書輩多學此書了無髙韻遂有院本體之目一時學士大夫多不賞玩蓋學弗能至自俗碑字未嘗俗也乃知唯其有之是以似之苟於中無有南越北轅去之愈逺因記余曽題一舊本云聖教如青㝠仙闕可望不可至乃知翰林侍書輩正如李少君設機殿屋雖懸足凌雲繡帶飄颺容色娟秀於仙姝何與長睿千古知言强欲學而至乎恨不能起之九原相視抵掌一笑也又王右軍書登無上神品今古琅琅固不必更論若聖教序右軍石刻中第一較定武蘭亭諸刻相絶千里而今碑在長安人人可搨賤易貴難故人莫知寳不知真足模楷百代稱山隂嫡嗣也夫以文皇宏文之主聖睿傍啟兼精臨池佳兒又粗能繼之一時摩搨之工宜靡有及此者且當時右軍殘楮纎墨盡入天府從真跡中搨出摩刻手亦復精絶稱山隂嫡嗣豈虛哉按此右軍之跡流傳人間詎止千萬傳搨失真肉眼莫辨遂使他刻乃敢狡然奪嫡而此祇爲搨工日夕餬口計擊撲之聲曉夜不斷行復剝落盡矣慨念神踪莫可奈何聊自解曰逸少之惠何渠止蕺山老媪也又集王聖教序與古詩十九首如青㝠仙闕可望不可至評者謂偏傍凑合大小展縮此固集書所不免以此病之耶此搨爲季安氏家藏百餘年前物也雖經斷闕鋒鎩猶存今關中得數十年前者如獲半璧補其闕斷輒冒連城肉眼視此反爲揶揄周鼎康觚能不於邑特命家童凌偃依松談閣製式􅋔潢成帙歸之季安其善寳之勿視肉眼又集書非始於聖教序如章帝千文諸跡皆集書不過僅入能品獨懷仁當文皇宏文之景運値右軍真跡囷萃乃能凑合展縮遂入神解豈天地精英之氣不欲遽冺耶真足模楷百代蘭亭淳化大觀皆逺出其下而觀者不知譯義止見碑後有潤色字遂謂一經懷仁手再爲于志寧許敬宗來濟薛元超李義府等潤色不無失真良可笑也余故備載譯義於此爲此書雪謗按唐宰相銜帶譯經潤文使至宋不改顯慶元年𤣥奘法師在大慈恩寺譯梵經薛元超李義府問古來譯義師答苻堅曇摩瞿譯中書侍郎趙整執筆姚興時鳩摩羅什譯安城侯姚嵩執筆貞觀波羅頗那譯左僕射令郡王孝恭太子詹事杜正倫太府蕭景等監閲敕曰𤣥奘所翻經論既新文義頗宜令太子太傅尚書左僕射燕國公于志寧中書令來濟禮部尚書許敬宗黃門侍郎薛元超侍郎李義府杜正倫看閲隨事潤色之觀此豈惟於右軍真跡無損於以見古重釋典乃爾故􅊀載之世人未竟釋典一語輒妄加貶駁是目不覩罪案而决人獄也又此未斷舊本也是武關構皮紙堅柔相得虛和受墨秦產也簾紋如織隃麋如漆嵗久入理第多補字爲拈出無致蘭亭訟端其𢎞福寺福字闕以蒼生罪而還福福字補晉右將軍將字以將日月而無窮將字補然則大教然字以然而天地然字補晦影歸真真字以受真教於上賢真字補智通無累通字以通神甸通字補非蓮性自潔非字以習俗而是非非字補桂質本貞貞字以幼懷貞敏貞字補將日月而無窮日字誤以即說呪曰曰字補斯福遐敷斯字以以爲斯記斯字補皇帝在春宮皇字以我皇福臻皇字補赴感應身感字以感懇誠感字補重昏之夜重字以誠重勞輕重字補火宅之朝火字以火宅之乾燄火字補幽闇而恒明而字以日月而恒明而字補忽見來書忽字以忽得來書忽字補度一切苦苦字以除一切苦苦字補無意識界無無名第二無字以亦無無明下無字補苦集滅道滅字誤以不増不减减字補共割補十八字一一指次頗極然犀至於斷文三十三反無一闕者亦奇矣余生平所見舊搨數十本惟仲宗王孫先世所藏爲第一余曽爲一䟦已二十餘年矣猶憶其鋒鎩此本髣髴勝之仲宗伯仲子十皆精硏博古千秋自命結社青門分余半席苟非斯道冠葢不入故鑒賞斯精金石史卷一
